name: CI Pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
        
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run application health check
        run: |
          python app.py &
          sleep 3
          curl -f http://localhost:5000/health
          kill %1

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
        
      - name: Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit detect-secrets safety

      - name: Run Bandit Security Scan
        run: |
          bandit -r app.py -f json -o bandit_report.json || true
          bandit -r app.py

      - name: Run Pip-Audit Security Scan
        run: |
          pip-audit -r requirements.txt

      - name: Run Secret Detection Scan
        run: |
          detect-secrets scan > .secrets-results.json
          detect-secrets audit .secrets-results.json --report
  
  docker:
    runs-on: ubuntu-latest
    needs: [test, security-scan]


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t securetask-api:latest .

      - name: Run Trivy Security Scan on Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securetask-api:latest
          format: 'table'
          exit-code: '1'
          severity: "CRITICAL,HIGH"